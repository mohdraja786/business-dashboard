<!DOCTYPE html>
<html>
<head>
    <title>My Sales Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="p-5">
    <h1 class="text-center mb-4 dashboard-title">My Business Dashboard 📊</h1>
    <hr>
    
    <form method="GET" action="/" class="d-flex justify-content-center mb-4">
        <div class="input-group" style="max-width: 600px;">
            <input type="text" name="category" class="form-control" placeholder="सर्च करें (जैसे: Furniture, Technology)" value="{{ search_query }}">
            <button class="btn btn-primary" type="submit">Search</button>
            <a href="/" class="btn btn-secondary">Clear</a>
        </div>
    </form>
    
    <div class="row text-center mb-4">
        <div class="col-md-6">
            <div class="card text-bg-success shadow mb-3">
              <div class="card-body">
                <h4 class="card-title">Total Sales</h4>
                <p class="card-text fs-2">₹ {{ total_sales }}</p>
              </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card text-bg-info shadow mb-3">
              <div class="card-body">
                <h4 class="card-title">Total Profit</h4>
                <p class="card-text fs-2">₹ {{ total_profit }}</p>
              </div>
            </div>
        </div>
    </div>

    <div class="row mb-5">
        <div class="col-md-8">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h4 class="text-center">Sales by Sub-Category</h4>
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h4 class="text-center">Sales by Region</h4>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <h3>Filtered Orders (Top 20)</h3>
            <div class="table-responsive">
                {{ table_html | safe }}
            </div>
        </div>
    </div>

    <script>
        // 1. Bar Chart
        const barCtx = document.getElementById('barChart');
        if(barCtx) {
            new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: {{ labels | safe }},
                    datasets: [{
                        label: 'Total Sales (₹)',
                        data: {{ values | safe }},
                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                }
            });
        }

        // 2. Pie Chart
        const pieCtx = document.getElementById('pieChart');
        if(pieCtx) {
            new Chart(pieCtx, {
                type: 'pie',
                data: {
                    labels: {{ pie_labels | safe }},
                    datasets: [{
                        data: {{ pie_values | safe }},
                        backgroundColor: ['#ff9999','#66b3ff','#99ff99','#ffcc99']
                    }]
                }
            });
        }
    </script>
</body>
</html>
